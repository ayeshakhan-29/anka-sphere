server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # nginx sits behind Railway's TLS-terminating edge on plain HTTP, so any
    # absolute redirect it generates would be http:// and get blocked as
    # mixed content by the HTTPS page. Keep redirects relative.
    absolute_redirect off;

    # Proxy API requests to backend.
    # - Regex matches /projects and /projects/... alike, so no trailing-slash
    #   301 is ever generated (that redirect was http:// and blocked).
    # - Railway routes by Host header and TLS SNI, so both must carry the
    #   backend's hostname — not $host (the frontend's) — or requests hang.
    location ~ ^/(auth|projects|maintenance)(/.*)?$ {
        client_max_body_size 25m;
        proxy_pass https://anka-sphere-be-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host anka-sphere-be-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_name anka-sphere-be-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
